# GAIA-Server — thin CI caller example.
# Copy this file to .github/workflows/ci.yml in the GAIA-Server repo.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §8, DEP-004
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    uses: xxkylesteenxx/GAIA-Core/.github/workflows/reusable-build-and-publish.yml@main
    with:
      image:             gaia-server
      dockerfile:        docker/Dockerfile.python-core
      language:          python
      working_directory: src
      publish:           ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit
