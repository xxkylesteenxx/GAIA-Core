// MemoryRetrievalService Protobuf schema
// Cross-host memory retrieval contract

syntax = "proto3";

package gaia.ipc.memory;

option java_package = "ai.gaia.ipc.memory";

message MemorySearchRequest {
  repeated float query_embedding = 1;
  int32 k = 2;
  string session_id = 3;
  bool capacity_fallback = 4;
  string trace_id = 5;
}

message MemorySearchResult {
  string atom_id = 1;
  string content = 2;
  string core = 3;
  float score = 4;
  string tier = 5;
  float latency_ms = 6;
  bool visible = 7;
}

message MemorySearchResponse {
  repeated MemorySearchResult results = 1;
  float total_latency_ms = 2;
  string trace_id = 3;
}

message IngestRequest {
  string content = 1;
  string core = 2;
  string session_id = 3;
  repeated string dependencies = 4;
  repeated string tags = 5;
}

message IngestResponse {
  string atom_id = 1;
  string causal_id = 2;
  bool ok = 3;
}

service MemoryRetrievalService {
  rpc Search(MemorySearchRequest) returns (MemorySearchResponse);
  rpc Ingest(IngestRequest) returns (IngestResponse);
}
