# GAIA Domain Launch Layout — Example
# Spec ref: VIRT-MEM-IPC-SPEC §5, §9
#
# This file describes the memory and IPC topology for a minimal
# two-domain GAIA deployment: a policy engine and a background service.

[[domain]]
name           = "policy_engine"
vcpu_count     = 2
memory_bytes   = 536870912   # 512 MiB
workload_class = 3           # GAIA_WL_POLICY_ENGINE

  [[domain.memory_region]]
  guest_phys  = 0x00000000
  size_bytes  = 536870912
  kind        = "private"

[[domain]]
name           = "background_svc"
vcpu_count     = 1
memory_bytes   = 268435456   # 256 MiB
workload_class = 0           # GAIA_WL_BACKGROUND

  [[domain.memory_region]]
  guest_phys  = 0x00000000
  size_bytes  = 268435456
  kind        = "private"

[[ipc_route]]
producer = "background_svc"
consumer = "policy_engine"
schema   = "gaia.event.report/v1"

[[ipc_route]]
producer = "policy_engine"
consumer = "background_svc"
schema   = "gaia.policy.directive/v1"
