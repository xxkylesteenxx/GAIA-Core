<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Content Security Policy scaffold.
      Tighten script-src and connect-src to the IPC socket origin
      before production deployment.
      Spec ref: GAIA Desktop Shell and Interaction Substrate Spec v1.0 §4.3
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        connect-src 'self';
        img-src     'self' data:;
        font-src    'self';
      "
    />

    <!-- Accessibility: reduced-motion preference applied via CSS before first paint (DSK-007) -->
    <style>
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration:   0.01ms !important;
          animation-iteration-count: 1  !important;
          transition-duration:  0.01ms !important;
          scroll-behavior:      auto   !important;
        }
      }

      /* Prevent flash of unstyled content before React hydration */
      html, body, #gaia-shell-root {
        margin:  0;
        padding: 0;
        width:   100%;
        height:  100%;
        overflow: hidden;
        background: #0a0a0f;
        color: #e8e8f0;
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>

    <title>GAIA Shell</title>
  </head>

  <body>
    <!--
      #gaia-shell-root  — primary React shell mount (Panel, LaunchSurface, WorkspaceSwitcher)
      #gaia-hud-root    — Consciousness HUD mount (floated above shell, aria-live region)

      Both roots are siblings so the HUD can be positioned independently
      of the shell layout without z-index battles inside a shared tree.
      Spec ref: GAIA Desktop Shell and Interaction Substrate Spec v1.0 §2.3, §2.4
    -->

    <!-- Skip-to-main link for keyboard users (DSK-003: accessibility designed in) -->
    <a
      href="#gaia-shell-root"
      class="skip-link"
      style="
        position: absolute;
        top: -40px;
        left: 0;
        background: #1a1a2e;
        color: #e8e8f0;
        padding: 8px 16px;
        z-index: 9999;
        border-radius: 0 0 4px 0;
        transition: top 0.1s;
      "
      onfocus="this.style.top='0'"
      onblur="this.style.top='-40px'"
    >
      Skip to main content
    </a>

    <!-- Consciousness HUD — floating above shell, ARIA live region (DSK-004) -->
    <div
      id="gaia-hud-root"
      role="region"
      aria-label="Consciousness HUD"
      aria-live="polite"
      aria-atomic="false"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 40px;          /* matches DesktopConfig.hud_reserved_top_px */
        z-index: 1000;
        pointer-events: none;  /* HUD is read-only by default; enable per-alert */
      "
    ></div>

    <!-- Primary shell mount -->
    <main
      id="gaia-shell-root"
      role="main"
      aria-label="GAIA Shell"
      style="padding-top: 40px;" <!-- offset for HUD band -->
    ></main>

    <!-- React entry point -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
