<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Content Security Policy scaffold.
      Tighten script-src and connect-src to the IPC socket origin
      before production deployment.
      Spec ref: GAIA Desktop Shell and Interaction Substrate Spec v1.0 §4.3
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        connect-src 'self';
        img-src     'self' data:;
        font-src    'self';
      "
    />

    <!-- Reduced-motion applied before first paint, no JS required (DSK-007) -->
    <style>
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration:        0.01ms !important;
          animation-iteration-count: 1      !important;
          transition-duration:       0.01ms !important;
          scroll-behavior:           auto   !important;
        }
      }
      /* Prevent FOUC before React hydration */
      html, body, #root {
        margin:     0;
        padding:    0;
        width:      100%;
        height:     100%;
        overflow:   hidden;
        background: #0a0a0f;
        color:      #e8e8f0;
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>

    <title>GAIA Shell</title>
  </head>

  <body>
    <!-- Skip-to-main link for keyboard navigation (DSK-003) -->
    <a
      href="#root"
      class="skip-link"
      style="
        position:      absolute;
        top:           -40px;
        left:          0;
        background:    #1a1a2e;
        color:         #e8e8f0;
        padding:       8px 16px;
        z-index:       9999;
        border-radius: 0 0 4px 0;
        transition:    top 0.1s;
      "
      onfocus="this.style.top='0'"
      onblur="this.style.top='-40px'"
    >
      Skip to main content
    </a>

    <!--
      #gaia-hud-portal — Consciousness HUD portal target.
      Rendered into by ConsciousnessHUD via ReactDOM.createPortal().
      Kept as a sibling of #root so it is visually fixed above the
      shell layer without z-index conflicts inside the React tree.
      aria-live and role are set by the ConsciousnessHUD component.
      Spec ref: GAIA Desktop Shell and Interaction Substrate Spec v1.0 §2.4
    -->
    <div id="gaia-hud-portal"></div>

    <!-- Primary React root -->
    <div id="root" role="main" aria-label="GAIA Shell"></div>

    <!-- Vite / React entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
