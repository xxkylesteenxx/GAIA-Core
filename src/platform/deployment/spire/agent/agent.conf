# GAIA SPIRE Agent — example configuration.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §9, DEP-006
#
# Replace placeholder values before deployment.

agent {
  data_dir            = "/opt/spire/data/agent"
  log_level           = "INFO"
  log_format          = "json"
  trust_domain        = "gaia.local"          # REPLACE_ME: must match server trust domain
  server_address      = "spire-server.gaia.svc.cluster.local"  # REPLACE_ME
  server_port         = "8081"
  socket_path         = "/run/spire/sockets/agent.sock"
  # Insecure bootstrap only for dev; use trust_bundle_path in production
  insecure_bootstrap  = true                  # REPLACE_ME: false in production
}

plugins {
  NodeAttestor "join_token" {
    plugin_data {}
    # REPLACE_ME: use k8s_psat (Kubernetes) or tpm_devid (bare-metal)
  }

  KeyManager "memory" {
    plugin_data {}
    # REPLACE_ME: use disk key manager in production for SVIDs persistence
  }

  WorkloadAttestor "unix" {
    plugin_data {
      discover_workload_path = true
    }
  }

  # WorkloadAttestor "k8s" {
  #   plugin_data {
  #     skip_kubelet_verification = false
  #   }
  # }
}
