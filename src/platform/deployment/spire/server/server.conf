# GAIA SPIRE Server — example configuration.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §9, DEP-006/DEP-007
#
# Replace placeholder values (REPLACE_ME) before deployment.
# This is a scaffold; review the SPIRE documentation for production hardening.

server {
  bind_address       = "0.0.0.0"
  bind_port          = "8081"
  trust_domain       = "gaia.local"           # REPLACE_ME: your trust domain
  data_dir           = "/opt/spire/data/server"
  log_level          = "INFO"
  log_format         = "json"
  # ca_ttl and default_svid_ttl should be tuned for your rotation policy
  ca_ttl             = "24h"
  default_svid_ttl   = "1h"
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type   = "sqlite3"             # REPLACE_ME: postgres in production
      connection_string = "/opt/spire/data/server/datastore.sqlite3"
    }
  }

  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/data/server/keys.json"
    }
  }

  NodeAttestor "join_token" {
    plugin_data {}
    # DEV/CI only — replace with x509pop or tpm_devid for production bare-metal
  }

  # Kubernetes PSAT node attestor (enable for k8s cluster nodes)
  # NodeAttestor "k8s_psat" {
  #   plugin_data {
  #     clusters = {
  #       "gaia-cluster" = {
  #         service_account_allow_list = ["gaia:gaia-server"]
  #       }
  #     }
  #   }
  # }

  UpstreamAuthority "disk" {
    plugin_data {
      key_file_path  = "/opt/spire/conf/server/dummy_upstream_ca.key"  # REPLACE_ME
      cert_file_path = "/opt/spire/conf/server/dummy_upstream_ca.crt"  # REPLACE_ME
    }
  }
}
