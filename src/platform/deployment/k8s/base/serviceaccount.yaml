# GAIA Server — ServiceAccount.
# Automounting is disabled; SPIRE provides workload identity via SVID.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §9
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gaia-server
  namespace: gaia
  labels:
    app.kubernetes.io/name: gaia-server
    app.kubernetes.io/part-of: gaia
automountServiceAccountToken: false
