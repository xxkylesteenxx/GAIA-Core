# GAIA Server — Kubernetes Service.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §5
apiVersion: v1
kind: Service
metadata:
  name: gaia-server
  namespace: gaia
  labels:
    app.kubernetes.io/name: gaia-server
    app.kubernetes.io/part-of: gaia
spec:
  selector:
    app.kubernetes.io/name: gaia-server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
