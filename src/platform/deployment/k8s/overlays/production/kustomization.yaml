# Kustomize overlay — production environment.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §5.2
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - patch: |
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: gaia-server
images:
  - name: gaia-server
    newTag: "0.1.0"  # pin to release tag in production
