# GAIA reusable workflow — container build and push.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §8, DEP-004
on:
  workflow_call:
    inputs:
      image:
        description: "Image name (without registry prefix)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: true
        type: string
      context:
        description: "Docker build context"
        required: false
        default: "."
        type: string
      push:
        description: "Push image to registry"
        required: false
        default: false
        type: boolean
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false

jobs:
  build:
    name: Build ${{ inputs.image }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build (and optionally push)
        uses: docker/build-push-action@v6
        with:
          context:    ${{ inputs.context }}
          file:       ${{ inputs.dockerfile }}
          push:       ${{ inputs.push }}
          tags:       ${{ inputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
