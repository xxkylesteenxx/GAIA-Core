# GAIA Ansible inventory — INI format (canonical source of record).
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7
#
# Shared connection vars are declared in [gaia_nodes:vars].
# Prefer hosts.yml for complex topologies; this file is the authoritative
# flat representation for operators who prefer INI syntax.

[gaia_nodes]
gaia-node-01 ansible_host=192.0.2.10
gaia-node-02 ansible_host=192.0.2.11

[gaia_nodes:vars]
ansible_user=gaia-admin
ansible_become=true
