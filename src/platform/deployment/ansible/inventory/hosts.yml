# GAIA Ansible inventory — canonical YAML format.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7, DEP-003
#
# Topology: flat gaia_nodes group, two nodes.
# Shared connection vars are in group_vars/gaia_nodes.yml.
#
# Equivalent INI representation is kept at inventory/hosts.ini for reference.

all:
  children:
    gaia_nodes:
      hosts:
        gaia-node-01:
          ansible_host: 192.0.2.10
        gaia-node-02:
          ansible_host: 192.0.2.11
