# GAIA Ansible inventory — scaffold.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7
#
# Replace placeholder hostnames/IPs with real values before use.
# Group structure:
#   gaia_nodes  — all GAIA runtime nodes
#     gaia_servers  — coordination / inference nodes
#     gaia_edge     — edge / IoT gateway nodes

all:
  children:
    gaia_nodes:
      children:
        gaia_servers:
          hosts:
            gaia-server-01:
              ansible_host: 192.168.10.11
              ansible_user: gaia
              gaia_role:    server
            gaia-server-02:
              ansible_host: 192.168.10.12
              ansible_user: gaia
              gaia_role:    server
        gaia_edge:
          hosts:
            gaia-edge-01:
              ansible_host: 192.168.10.21
              ansible_user: gaia
              gaia_role:    edge
