# bootstrap role — default variables.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7
#
# gaia_user and gaia_group are defined in gaia_node/defaults/main.yml.
# Bootstrap reads them — no need to re-declare here unless overriding.

# Package cache max age before forced refresh (seconds, Debian only)
bootstrap_cache_valid_time: 3600

# SSH hardening: set false to skip PasswordAuthentication hardening
bootstrap_harden_ssh: true
