# container_runtime role — default variables.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7
#
# container_runtime is the authoritative selector variable.
# It is set in gaia_node/defaults/main.yml (default: 'docker').
# Supported values: docker | containerd | podman
#
# No package lists needed — packages are declared inline in tasks
# using distro-provided names for portability.
