# container_runtime role — install and configure container runtime.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7, DEP-003
#
# Idempotent — safe to re-run on a converged host.
# Runtime is selected by the container_runtime variable (default: 'docker').
# Supported values: docker | containerd | podman
---
# --- Docker (via distro package repositories) ---
- name: Install Docker runtime on Debian-family nodes
  ansible.builtin.package:
    name:
      - docker.io
    state: present
  when: container_runtime == 'docker'

- name: Ensure docker service is enabled
  ansible.builtin.service:
    name:    docker
    enabled: true
    state:   started
  when: container_runtime == 'docker'

- name: Add GAIA user to docker group
  ansible.builtin.user:
    name:   "{{ gaia_user }}"
    groups: docker
    append: true
  when: container_runtime == 'docker'

# --- containerd ---
- name: Install containerd runtime
  ansible.builtin.package:
    name:
      - containerd
    state: present
  when: container_runtime == 'containerd'

- name: Ensure containerd service is enabled
  ansible.builtin.service:
    name:    containerd
    enabled: true
    state:   started
  when: container_runtime == 'containerd'

# --- podman (daemonless; no service task required) ---
- name: Install podman runtime
  ansible.builtin.package:
    name:
      - podman
    state: present
  when: container_runtime == 'podman'
