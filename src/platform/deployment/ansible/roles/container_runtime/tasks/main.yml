# container_runtime role — install and configure container runtime.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7, DEP-003
# Idempotent — safe to re-run.
---
# --- Docker ---
- name: Add Docker GPG key (Debian)
  when:
    - container_runtime == 'docker'
    - ansible_os_family == 'Debian'
  ansible.builtin.get_url:
    url:  "{{ docker_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository (Debian)
  when:
    - container_runtime == 'docker'
    - ansible_os_family == 'Debian'
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc]
      {{ docker_apt_repo }} {{ ansible_distribution_release }} stable
    state: present

- name: Install Docker (Debian)
  when:
    - container_runtime == 'docker'
    - ansible_os_family == 'Debian'
  ansible.builtin.apt:
    name:         "{{ docker_packages }}"
    state:        present
    update_cache: true
  notify: start and enable docker

- name: Install Docker (RedHat)
  when:
    - container_runtime == 'docker'
    - ansible_os_family == 'RedHat'
  ansible.builtin.dnf:
    name:  "{{ docker_packages }}"
    state: present
  notify: start and enable docker

- name: Add GAIA user to docker group
  when: container_runtime == 'docker'
  ansible.builtin.user:
    name:   "{{ gaia_user }}"
    groups: docker
    append: true

# --- containerd ---
- name: Install containerd
  when: container_runtime == 'containerd'
  ansible.builtin.package:
    name:  "{{ containerd_packages }}"
    state: present
  notify: start and enable containerd

# --- podman ---
- name: Install podman
  when: container_runtime == 'podman'
  ansible.builtin.package:
    name:  "{{ podman_packages }}"
    state: present
