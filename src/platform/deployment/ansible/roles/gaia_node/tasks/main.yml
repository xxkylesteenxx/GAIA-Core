# gaia_node role — GAIA directory layout and node configuration.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7, DEP-003
#
# Preconditions (satisfied by earlier roles in bootstrap.yml play):
#   - bootstrap  : gaia_user and gaia_group already exist
#   - container_runtime: container runtime installed and running
#
# Idempotent — safe to re-run on a converged host.
---
# --- Directory layout ---
- name: Ensure GAIA directories exist
  ansible.builtin.file:
    path:  "{{ item }}"
    state: directory
    owner: "{{ gaia_user }}"
    group: "{{ gaia_group }}"
    mode:  '0755'
  loop:
    - "{{ gaia_root }}"
    - "{{ gaia_root }}/config"
    - "{{ gaia_root }}/data"
    - "{{ gaia_root }}/identity"

# --- Node environment file ---
- name: Place GAIA node environment file
  ansible.builtin.copy:
    dest:  "{{ gaia_root }}/config/node.env"
    owner: "{{ gaia_user }}"
    group: "{{ gaia_group }}"
    mode:  '0640'
    content: |
      GAIA_NODE_ROLE={{ gaia_role }}
      SPIFFE_TRUST_DOMAIN={{ gaia_spiffe_trust_domain }}
      GAIA_IDENTITY_MODE={{ gaia_identity_mode }}
