# gaia_node role — default variables.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §7, DEP-003
#
# Override in inventory/group_vars/ or inventory/host_vars/ as needed.

# --- Identity ---
gaia_root:              /opt/gaia
gaia_user:              gaia
gaia_group:             gaia

# --- Container runtime ---
container_runtime:      docker          # docker | containerd | podman

# --- Derived directories (all rooted under gaia_root) ---
gaia_config_dir:        /etc/gaia
gaia_log_dir:           /var/log/gaia
gaia_run_dir:           /run/gaia
gaia_data_dir:          "{{ gaia_root }}/data"
gaia_bin_dir:           "{{ gaia_root }}/bin"

# --- System account ---
gaia_uid:               1001
gaia_gid:               1001

# --- SPIRE / identity ---
gaia_spire_socket:      /run/spire/sockets/agent.sock
gaia_spiffe_trust_domain: gaia.internal
gaia_identity_mode:     spire

# --- Node metadata ---
gaia_node_tag:          scaffold
gaia_role:              edge            # server | edge | node
