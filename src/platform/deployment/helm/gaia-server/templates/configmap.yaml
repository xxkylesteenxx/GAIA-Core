apiVersion: v1
kind: ConfigMap
metadata:
  name: gaia-config
  namespace: {{ .Values.namespace }}
data:
  GAIA_ENV: {{ .Values.config.gaiaEnv | default "production" | quote }}
  INFERENCE_ROUTER_MODE: {{ .Values.config.routerMode | default "hybrid" | quote }}
  SPIFFE_TRUST_DOMAIN: {{ .Values.config.trustDomain | default "gaia.internal" | quote }}
