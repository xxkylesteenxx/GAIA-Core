{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: gaia-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "REPLACE_ME" | quote }}
  MODEL_REGISTRY_TOKEN: {{ .Values.secrets.modelRegistryToken | default "REPLACE_ME" | quote }}
{{- end }}
