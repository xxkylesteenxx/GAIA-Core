apiVersion: v1
kind: Service
metadata:
  name: {{ include "gaia-server.fullname" . }}
  labels: {{- include "gaia-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "gaia-server.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
