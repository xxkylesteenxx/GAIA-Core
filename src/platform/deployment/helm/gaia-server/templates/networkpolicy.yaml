{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gaia-router-allow
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: gaia-router
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.router.containerPort }}
  egress:
    - ports:
        - port: 5432
      to:
        - podSelector:
            matchLabels:
              app: gaia-rag-store
{{- end }}
