{{- if .Values.ragStore.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gaia-rag-store
  namespace: {{ .Values.namespace }}
spec:
  serviceName: gaia-rag-store
  replicas: 1
  selector:
    matchLabels:
      app: gaia-rag-store
  template:
    metadata:
      labels:
        app: gaia-rag-store
    spec:
      containers:
        - name: rag-store
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.ragStore.postgresDb | default "gaia" | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.ragStore.postgresUser | default "gaia" | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gaia-secrets
                  key: MODEL_REGISTRY_TOKEN
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.ragStore.storage | default "20Gi" }}
{{- end }}
