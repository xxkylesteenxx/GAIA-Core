# GAIA Server — Helm Deployment template.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §6
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gaia-server.fullname" . }}
  labels: {{- include "gaia-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "gaia-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "gaia-server.selectorLabels" . | nindent 8 }}
      annotations: {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "gaia-server.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gaia-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GAIA_ENV
              value: {{ .Values.config.env | quote }}
            - name: GAIA_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: GAIA_SPIFFE_SOCKET
              value: {{ .Values.config.spiffeSocket | quote }}
            - name: GAIA_OTEL_ENDPOINT
              value: {{ .Values.config.otelEndpoint | quote }}
            - name: GAIA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecretName }}
                  key: secret-key
          resources: {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      nodeSelector:  {{- toYaml .Values.nodeSelector  | nindent 8 }}
      tolerations:   {{- toYaml .Values.tolerations   | nindent 8 }}
      affinity:      {{- toYaml .Values.affinity       | nindent 8 }}
