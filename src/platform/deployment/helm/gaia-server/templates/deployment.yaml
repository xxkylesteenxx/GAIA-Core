apiVersion: apps/v1
kind: Deployment
metadata:
  name: gaia-router
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      app: gaia-router
  template:
    metadata:
      labels:
        app: gaia-router
    spec:
      serviceAccountName: gaia-router
      containers:
        - name: router
          image: "{{ .Values.router.image.repository }}:{{ .Values.router.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.router.containerPort }}
          envFrom:
            - configMapRef:
                name: gaia-config
            - secretRef:
                name: gaia-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.router.containerPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.router.containerPort }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
