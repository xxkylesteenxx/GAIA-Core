# GAIA Router — Helm Deployment template.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §6
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gaia-router
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      app: gaia-router
  template:
    metadata:
      labels:
        app: gaia-router
    spec:
      containers:
        - name: router
          image: "{{ .Values.router.image.repository }}:{{ .Values.router.image.tag }}"
          ports:
            - containerPort: {{ .Values.router.containerPort }}
          envFrom:
            - configMapRef:
                name: gaia-config
