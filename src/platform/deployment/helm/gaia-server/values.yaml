# GAIA Server — Helm default values.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §6
#
# This file is the primary release configuration surface (DEP-002).
# Live secret material MUST NOT be stored here — inject via sealed-secret
# or external-secrets-operator.

# --- Namespace --------------------------------------------------------------
namespace: gaia-system

# --- Router -----------------------------------------------------------------
router:
  image:
    repository: ghcr.io/example/gaia-router
    tag:        v1.0.0
    pullPolicy: IfNotPresent
  replicas:      2
  servicePort:   80
  containerPort: 8080
  resources:
    requests:
      cpu:    "100m"
      memory: "128Mi"
    limits:
      cpu:    "500m"
      memory: "512Mi"

# --- Runtime config ---------------------------------------------------------
config:
  gaiaEnv:     production
  routerMode:  hybrid          # hybrid | inference-only | coordination-only
  trustDomain: gaia.internal
  logLevel:    info
  spiffeSocket: unix:///run/spire/sockets/agent.sock
  otelEndpoint: http://otel-collector.monitoring.svc.cluster.local:4317

# --- RAG store (persistent vector / document store) ------------------------
ragStore:
  enabled: true
  storage: 20Gi
  storageClassName: ""         # leave empty to use cluster default
  accessMode: ReadWriteOnce

# --- External secret --------------------------------------------------------
# Name of the Kubernetes Secret containing GAIA_SECRET_KEY.
# Must be pre-created or managed by external-secrets-operator / sealed-secrets.
externalSecretName: gaia-server-secret

# --- Service account --------------------------------------------------------
serviceAccount:
  create: true
  automountServiceAccountToken: false

# --- Scheduling -------------------------------------------------------------
nodeSelector:   {}
tolerations:    []
affinity:       {}
podAnnotations: {}
