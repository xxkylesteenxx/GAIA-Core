name: Bug Report
description: Report a reproducible bug in GAIA-Core
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: GAIA-Core version / commit SHA
      placeholder: e.g. main@abc1234 or v0.1.0
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Affected component
      placeholder: e.g. gaia_core/storage, bootstrap, kernel, vmm
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or tracebacks
      render: shell

  - type: input
    id: os
    attributes:
      label: OS and kernel version
      placeholder: e.g. Ubuntu 24.04, Linux 6.8
