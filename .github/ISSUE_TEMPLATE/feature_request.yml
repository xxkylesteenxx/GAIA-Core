name: Feature Request
description: Propose a new feature or enhancement for GAIA-Core
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests welcome. Please link to any relevant specs or ADRs.

  - type: input
    id: component
    attributes:
      label: Target component
      placeholder: e.g. gaia_core/storage, bootstrap, platform/filesystem
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: layer
    attributes:
      label: Architectural layer
      options:
        - Substrate / storage
        - Core / consciousness
        - Platform / kernel
        - Federation / Meta
        - CI / governance
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: adr
    attributes:
      label: ADR needed?
      options:
        - label: This change is large enough to warrant an ADR
