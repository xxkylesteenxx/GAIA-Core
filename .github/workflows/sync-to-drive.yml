# GAIA-Core → Google Drive Backup
#
# Mirrors the full repository to a Google Drive folder after every push to main.
# Also runs on a nightly schedule as a safety net.
#
# COMPLETELY READ-ONLY with respect to this repository.
# It never modifies any source file or commits anything back.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GDRIVE_CREDENTIALS   — base64-encoded Google service account JSON key
#   GDRIVE_FOLDER_ID     — ID of the target Google Drive folder
#                           (from the folder URL: drive.google.com/drive/folders/<ID>)
#
# Setup steps (one-time):
#   1. Create a Google Cloud project and enable the Google Drive API.
#   2. Create a Service Account and download its JSON key.
#   3. Share your target Drive folder with the service account email (Editor role).
#   4. base64-encode the key:  base64 -w 0 key.json
#   5. Add GDRIVE_CREDENTIALS and GDRIVE_FOLDER_ID as GitHub repo secrets.

name: Backup to Google Drive

on:
  push:
    branches:
      - main
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  backup:
    name: Mirror repo to Google Drive
    runs-on: ubuntu-latest
    permissions:
      contents: read   # read-only — never writes back to repo

    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so nothing is missed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google Drive client
        run: pip install --quiet google-api-python-client google-auth

      - name: Decode service account credentials
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          echo "$GDRIVE_CREDENTIALS" | base64 --decode > /tmp/gdrive_key.json

      - name: Upload repository to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python - <<'EOF'
          import os
          import pathlib
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          KEY_FILE = "/tmp/gdrive_key.json"
          ROOT_FOLDER_ID = os.environ["GDRIVE_FOLDER_ID"]
          REPO_ROOT = pathlib.Path(".")

          # Files and directories to exclude from backup
          EXCLUDE = {".git", "__pycache__", ".pytest_cache", ".mypy_cache",
                     ".ruff_cache", "*.pyc", "*.pyo", ".DS_Store", "node_modules"}

          creds = service_account.Credentials.from_service_account_file(KEY_FILE, scopes=SCOPES)
          service = build("drive", "v3", credentials=creds, cache_discovery=False)

          def should_exclude(name: str) -> bool:
              import fnmatch
              return any(fnmatch.fnmatch(name, pattern) for pattern in EXCLUDE)

          def get_or_create_folder(name: str, parent_id: str) -> str:
              """Return the Drive folder ID, creating it if it doesn't exist."""
              query = (
                  f"name='{name}' and "
                  f"'{parent_id}' in parents and "
                  "mimeType='application/vnd.google-apps.folder' and "
                  "trashed=false"
              )
              results = service.files().list(q=query, fields="files(id)").execute()
              files = results.get("files", [])
              if files:
                  return files[0]["id"]
              meta = {
                  "name": name,
                  "mimeType": "application/vnd.google-apps.folder",
                  "parents": [parent_id],
              }
              folder = service.files().create(body=meta, fields="id").execute()
              return folder["id"]

          def upload_file(local_path: pathlib.Path, parent_id: str) -> None:
              """Upload or update a single file in Drive."""
              name = local_path.name
              # Check if file already exists
              query = (
                  f"name='{name}' and "
                  f"'{parent_id}' in parents and "
                  "trashed=false"
              )
              results = service.files().list(q=query, fields="files(id)").execute()
              existing = results.get("files", [])
              media = MediaFileUpload(str(local_path), resumable=True)
              if existing:
                  service.files().update(
                      fileId=existing[0]["id"], media_body=media
                  ).execute()
              else:
                  meta = {"name": name, "parents": [parent_id]}
                  service.files().create(body=meta, media_body=media, fields="id").execute()
              print(f"  Synced: {local_path}")

          def sync_directory(local_dir: pathlib.Path, drive_folder_id: str) -> None:
              """Recursively sync a local directory to Drive."""
              for item in sorted(local_dir.iterdir()):
                  if should_exclude(item.name):
                      continue
                  if item.is_dir():
                      child_id = get_or_create_folder(item.name, drive_folder_id)
                      sync_directory(item, child_id)
                  elif item.is_file():
                      upload_file(item, drive_folder_id)

          # Create or find a timestamped backup folder inside the target Drive folder
          import datetime
          timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          backup_folder_name = f"GAIA-Core-backup-{timestamp}"
          backup_folder_id = get_or_create_folder(backup_folder_name, ROOT_FOLDER_ID)
          print(f"Backing up to Drive folder: {backup_folder_name} ({backup_folder_id})")

          sync_directory(REPO_ROOT, backup_folder_id)
          print("Backup complete.")
          EOF

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/gdrive_key.json
