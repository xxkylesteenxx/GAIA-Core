# GAIA — canonical reusable CI workflow: validate, build, and publish.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §8, DEP-004
#
# Called by thin repo-local callers via:
#   uses: xxkylesteenxx/GAIA-Core/.github/workflows/reusable-build-and-publish.yml@main
#
# Inputs
#   image_name   (required) — image name, no registry prefix
#   workdir      (optional, default: .)        — Docker build context
#   dockerfile   (optional, default: Dockerfile) — path to Dockerfile
#   push_image   (optional, default: false)    — push to ghcr.io after build
#
# Secrets
#   ghcr_token   (optional) — required only when push_image: true
#
# First adopters: GAIA-Core, GAIA-Server, GAIA-Desktop, GAIA-IoT, GAIA-Meta
name: reusable-build-and-publish

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      workdir:
        required: false
        type: string
        default: .
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      push_image:
        required: false
        type: boolean
        default: false
    secrets:
      ghcr_token:
        required: false

jobs:
  validate-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install YAML parser
        run: python -m pip install pyyaml

      - name: Lint YAML
        run: |
          python - <<'PY'
          import pathlib, yaml
          for path in list(pathlib.Path('.').rglob('*.yml')) + list(pathlib.Path('.').rglob('*.yaml')):
              try:
                  yaml.safe_load(path.read_text())
              except Exception as exc:
                  raise SystemExit(f"YAML parse failure in {path}: {exc}")
          print('YAML parse ok')
          PY

      - name: Log in to ghcr.io
        if: inputs.push_image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.ghcr_token }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context:    ${{ inputs.workdir }}
          file:       ${{ inputs.dockerfile }}
          push:       ${{ inputs.push_image }}
          tags:       ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
