# GAIA — canonical reusable CI workflow: build, lint, and publish.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §8, DEP-004
#
# Called by thin repo-local callers via:
#   uses: xxkylesteenxx/GAIA-Core/.github/workflows/reusable-build-and-publish.yml@main
#
# First adopters: GAIA-Core, GAIA-Server, GAIA-Desktop, GAIA-IoT, GAIA-Meta
# Additional repos can consume this without forking pipeline logic (DEP-004).

on:
  workflow_call:
    inputs:
      image:
        description: "Container image name (without registry prefix)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to repo root"
        required: true
        type: string
      context:
        description: "Docker build context path"
        required: false
        default: "."
        type: string
      language:
        description: "Primary service language for lint step: python | rust | typescript | yaml"
        required: true
        type: string
      working_directory:
        description: "Working directory for lint commands"
        required: false
        default: "."
        type: string
      publish:
        description: "Push image to registry after successful build"
        required: false
        default: false
        type: boolean
      registry:
        description: "Container registry hostname (e.g. ghcr.io)"
        required: false
        default: "ghcr.io"
        type: string
      registry_namespace:
        description: "Registry namespace / org (e.g. xxkylesteenxx)"
        required: false
        default: "xxkylesteenxx"
        type: string
    secrets:
      REGISTRY_TOKEN:
        required: false

jobs:
  # ---- Lint ------------------------------------------------------------------
  lint:
    name: Lint (${{ inputs.language }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Lint — Python (ruff + mypy)
        if: inputs.language == 'python'
        run: |
          pip install ruff mypy --quiet
          ruff check .
          mypy . --ignore-missing-imports

      - name: Lint — Rust (clippy)
        if: inputs.language == 'rust'
        run: |
          rustup component add clippy
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Lint — TypeScript (tsc + eslint)
        if: inputs.language == 'typescript'
        run: |
          npm ci
          npm run typecheck
          npm run lint

      - name: Lint — YAML / Kubernetes (yamllint + kubeconform)
        if: inputs.language == 'yaml'
        run: |
          pip install yamllint --quiet
          yamllint .
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          find . -name '*.yaml' | xargs ./kubeconform -strict -ignore-missing-schemas

  # ---- Build (and optional publish) -----------------------------------------
  build:
    name: Build ${{ inputs.image }}
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ inputs.registry }}
        if: inputs.publish
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_namespace }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Derive image tags
        id: tags
        run: |
          IMAGE="${{ inputs.registry }}/${{ inputs.registry_namespace }}/${{ inputs.image }}"
          echo "sha_tag=${IMAGE}:${{ github.sha }}"    >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE}:latest"            >> "$GITHUB_OUTPUT"

      - name: Build (and optionally publish)
        uses: docker/build-push-action@v6
        with:
          context:    ${{ inputs.context }}
          file:       ${{ inputs.dockerfile }}
          push:       ${{ inputs.publish }}
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
