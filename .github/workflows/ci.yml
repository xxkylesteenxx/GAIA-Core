name: GAIA-Core CI

on:
  push:
    branches: [main, 'phase-*', 'feat/*', 'fix/*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --output-format=github

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -e . || true
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=gaia_core --cov-report=term-missing

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install mypy
        run: pip install mypy
      - name: Run mypy
        run: mypy gaia_core/ --ignore-missing-imports || true
