# GAIA-Core — thin CI caller.
# Spec ref: GAIA Deployment and Attested Identity Spec v1.0 §8, DEP-004
#
# All job logic lives in reusable-build-and-publish.yml.
# This file passes repo-specific inputs only.
name: core-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  call-shared:
    uses: ./.github/workflows/reusable-build-and-publish.yml
    with:
      image_name:  gaia-core
      workdir:     .
      dockerfile:  Dockerfile
      push_image:  false
    secrets: inherit
